version: '3.8'

services:
  learnmart-build:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learnmart-builder
    volumes:
      - build-output:/output

  learnmart-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: learnmart-tester
    volumes:
      - test-results:/app/test-results

volumes:
  build-output:
  test-results:
